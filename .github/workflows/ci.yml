name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  codegen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 커밋된 스펙에서 재생성 → diff가 있으면 수동 편집이거나 생성 누락 (architecture.md §1)
      - run: pnpm api:generate
      - run: git diff --exit-code openapi src/shared/api/generated
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks scan
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: detect --source=. --redact -v
